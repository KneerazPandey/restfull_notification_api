services:
  push_notification_service:
    build:
      context: .
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - .:/app
    image: push_notification_service
    container_name: push_notification_service_container
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - redis

  redis:
    restart: always
    image: redis
    ports:
      - 6379:6379
    container_name: redis_notification_container
